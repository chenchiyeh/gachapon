<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Gachapon 🎀</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:     #fdf8f0;
      --ink:       #3d2f2f;
      --ink-soft:  #7a6060;
      --rose:      #e8b4bc;
      --rose-mid:  #d4909a;
      --rose-dark: #b87080;
      --butter:    #f0e0a0;
    }

    body {
      font-family: 'Caveat', cursive;
      background-color: var(--cream);
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 27px,
        rgba(180,160,140,0.08) 27px, rgba(180,160,140,0.08) 28px
      );
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 16px 80px;
      gap: 20px;
      color: var(--ink);
    }

    .svg-filters { position: absolute; width: 0; height: 0; }

    /* ── Header ── */
    .header { text-align: center; }
    .header-deco { font-size: 22px; letter-spacing: 4px; margin-bottom: 2px; }
    .header-title {
      font-family: 'Caveat', cursive;
      font-size: clamp(32px, 7vw, 54px);
      font-weight: 700; color: var(--rose-dark);
      line-height: 1.1; transform: rotate(-1deg); display: inline-block;
    }
    .header-sub {
      margin-top: 4px; font-size: clamp(15px, 3vw, 19px);
      color: var(--ink-soft); font-weight: 400;
      transform: rotate(0.5deg); display: inline-block;
    }

    /* ── Background doodle ── */
    .bg-doodle {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .bg-doodle svg { width: 100%; height: 100%; }
    body > *:not(.bg-doodle) { position: relative; z-index: 1; }

    /* ── Machine stage ── */
    .machine-stage {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .machine-svg-wrap {
      position: relative;
      width: 270px;
    }
    .machine-svg-wrap > svg { width: 100%; height: auto; overflow: visible; }

    /* Globe balls */
    .globe-balls {
      display: flex; flex-wrap: wrap;
      align-content: center; justify-content: center;
      gap: 6px; padding: 16px;
      width: 170px; height: 170px;
    }
    .globe-balls.shaking { animation: globe-shake 0.7s ease-in-out; }

    @keyframes globe-shake {
      0%   { transform: translate(0,0) rotate(0deg); }
      12%  { transform: translate(-5px, 4px) rotate(-3deg); }
      25%  { transform: translate(6px,-4px) rotate(3deg); }
      38%  { transform: translate(-4px, 5px) rotate(-2deg); }
      52%  { transform: translate(5px,-3px) rotate(2deg); }
      65%  { transform: translate(-3px, 3px) rotate(-1deg); }
      78%  { transform: translate(2px,-2px) rotate(0.5deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }

    .mini-ball {
      width: 26px; height: 26px; border-radius: 50%;
      position: relative; flex-shrink: 0;
      animation: bob 2.4s ease-in-out infinite;
      outline: 2px solid rgba(60,40,40,0.18);
    }
    .globe-balls.shaking .mini-ball { animation: ball-shuffle 0.7s ease-in-out infinite; }
    .globe-balls.shaking .mini-ball:nth-child(odd)  { animation-delay: 0s; }
    .globe-balls.shaking .mini-ball:nth-child(even) { animation-delay: 0.12s; }

    @keyframes ball-shuffle {
      0%,100% { transform: translate(0,0) rotate(0deg); }
      20%      { transform: translate(-3px,-4px) rotate(-5deg); }
      40%      { transform: translate(4px, 3px) rotate(4deg); }
      60%      { transform: translate(-2px, 4px) rotate(-3deg); }
      80%      { transform: translate(3px,-2px) rotate(3deg); }
    }

    .mini-ball::after {
      content: ''; position: absolute;
      top: 4px; left: 6px; width: 8px; height: 5px;
      background: rgba(255,255,255,0.55); border-radius: 50%;
      transform: rotate(-25deg);
    }
    .mini-ball:nth-child(2) { animation-delay: 0.3s; }
    .mini-ball:nth-child(3) { animation-delay: 0.6s; }
    .mini-ball:nth-child(4) { animation-delay: 0.9s; }
    .mini-ball:nth-child(5) { animation-delay: 1.2s; }
    .mini-ball:nth-child(6) { animation-delay: 1.5s; }
    .mini-ball:nth-child(7) { animation-delay: 0.15s; }
    .mini-ball:nth-child(8) { animation-delay: 0.45s; }
    .mini-ball:nth-child(9) { animation-delay: 0.75s; }

    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50%       { transform: translateY(-5px) rotate(1deg); }
    }

    /* ── Knob hit area ── */
    .knob-hitarea {
      position: absolute;
      bottom: 68px; right: 46px;
      width: 54px; height: 54px;
      border-radius: 50%;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      z-index: 10;
      background: #f0e0a0;
      border: 2.5px solid #3d2f2f;
      box-shadow: 3px 3px 0 #b8a060;
      display: flex; align-items: center; justify-content: center;
    }
    .knob-hitarea::before {
      content: '';
      position: absolute;
      top: 6px; left: 50%; transform: translateX(-50%);
      width: 5px; height: 17px;
      background: #b8a060;
      border-radius: 3px;
    }
    .knob-hitarea::after {
      content: '';
      position: absolute;
      top: 9px; left: 8px;
      width: 14px; height: 9px;
      background: rgba(255,255,255,0.38);
      border-radius: 50%;
      transform: rotate(-20deg);
    }
    .knob-hitarea:focus-visible { outline: 2px dashed var(--rose-dark); outline-offset: 3px; }
    .knob-hitarea.disabled { cursor: default; pointer-events: none; opacity: 0.6; }
    .knob-hitarea.spinning {
      animation: knob-spin 0.9s cubic-bezier(0.4, 0, 0.25, 1) forwards;
    }
    @keyframes knob-spin {
      0%   { transform: rotate(0deg); }
      18%  { transform: rotate(165deg); }
      50%  { transform: rotate(300deg); }
      72%  { transform: rotate(345deg); }
      86%  { transform: rotate(356deg); }
      100% { transform: rotate(360deg); }
    }

    /* ── Rolling ball ── */
    #rolling-ball {
      position: absolute;
      width: 34px; height: 34px;
      border-radius: 50%;
      outline: 2.5px solid rgba(60,40,40,0.2);
      display: none;
      z-index: 20;
    }
    #rolling-ball::before {
      content: '';
      position: absolute;
      top: 6px; left: 9px;
      width: 11px; height: 7px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      transform: rotate(-20deg);
    }
    #rolling-ball .rb-seam-h {
      position: absolute; top: 50%; left: 5%; right: 5%; height: 2px;
      background: rgba(60,40,40,0.12); transform: translateY(-50%); border-radius: 1px;
    }
    #rolling-ball .rb-seam-v {
      position: absolute; left: 50%; top: 5%; bottom: 5%; width: 2px;
      background: rgba(60,40,40,0.12); transform: translateX(-50%); border-radius: 1px;
    }

    .tray-wrap { position: relative; margin-top: -2px; }

    /* ── Idle hint ── */
    .idle-hint {
      font-size: 17px; color: var(--ink-soft);
      text-align: center; transform: rotate(-0.5deg);
    }

    /* ── Footer ── */
    .footer {
      font-size: 15px; color: var(--ink-soft);
      text-align: center; transform: rotate(-0.3deg);
      display: inline-block;
    }

    /* ══════════════════════════════
       MODAL
    ══════════════════════════════ */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(61,47,47,0.35);
      z-index: 200; align-items: center;
      justify-content: center; padding: 24px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      position: relative;
      background: #fffdf7;
      border: 2.5px solid var(--ink);
      border-radius: 6px 18px 8px 14px / 14px 6px 18px 8px;
      padding: 36px 28px 28px;
      max-width: 340px; width: 100%;
      text-align: center;
      box-shadow: 5px 6px 0 rgba(60,40,40,0.13);
      animation: modal-pop 0.4s cubic-bezier(0.18,0.89,0.32,1.28) both;
    }
    .modal::before {
      content: ''; position: absolute;
      top: -12px; left: 50%;
      transform: translateX(-50%) rotate(-1.5deg);
      width: 52px; height: 18px;
      background: rgba(240,224,160,0.75);
      border-radius: 2px; border: 1px solid rgba(180,160,80,0.3);
    }
    @keyframes modal-pop {
      0%   { opacity: 0; transform: scale(0.7) rotate(-3deg); }
      100% { opacity: 1; transform: scale(1) rotate(-0.5deg); }
    }

    .modal-ball {
      width: 80px; height: 80px; border-radius: 50%;
      margin: 0 auto 18px; position: relative;
      box-shadow: 3px 3px 0 rgba(60,40,40,0.15), 0 0 0 3px rgba(60,40,40,0.1);
      animation: drop-in 0.45s cubic-bezier(0.18,0.89,0.32,1.28) 0.05s both;
    }
    .modal-ball::before {
      content: ''; position: absolute;
      top: 11px; left: 15px;
      width: 20px; height: 12px;
      background: rgba(255,255,255,0.5); border-radius: 50%;
      transform: rotate(-20deg);
    }
    .modal-ball .seam-h {
      position: absolute; top: 50%; left: 5%; right: 5%; height: 2px;
      background: rgba(60,40,40,0.1); transform: translateY(-50%); border-radius: 1px;
    }
    .modal-ball .seam-v {
      position: absolute; left: 50%; top: 5%; bottom: 5%; width: 2px;
      background: rgba(60,40,40,0.1); transform: translateX(-50%); border-radius: 1px;
    }
    @keyframes drop-in {
      0%   { opacity: 0; transform: translateY(-30px) scale(0.5) rotate(-8deg); }
      100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    }

    .modal-message {
      font-family: 'Caveat', cursive;
      font-size: 20px; font-weight: 600;
      color: var(--ink); line-height: 1.45;
      animation: fade-up 0.3s ease 0.28s both;
    }
    @keyframes fade-up {
      0%   { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .modal-close {
      margin-top: 22px; display: inline-block;
      font-family: 'Caveat', cursive;
      font-size: 17px; font-weight: 700; color: var(--ink);
      background: var(--butter);
      border: 2px solid var(--ink);
      border-radius: 3px 10px 4px 8px / 8px 3px 10px 4px;
      padding: 6px 24px; cursor: pointer;
      box-shadow: 3px 3px 0 rgba(60,40,40,0.15);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .modal-close:hover  { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 rgba(60,40,40,0.15); }
    .modal-close:active { transform: translate(2px,2px);   box-shadow: 1px 1px 0 rgba(60,40,40,0.15); }

    /* ══════════════════════════════
       HEART BALLOON CELEBRATION
    ══════════════════════════════ */
    #balloon-canvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 998; /* below modal (200 stacking context) but above page */
    }

    /* Glow pulse on the final modal */
    .modal-overlay.final .modal {
      animation: modal-pop 0.4s cubic-bezier(0.18,0.89,0.32,1.28) both,
                 final-glow 2s ease-in-out 0.5s infinite alternate;
      border-color: #e8b4bc;
    }
    @keyframes final-glow {
      0%   { box-shadow: 5px 6px 0 rgba(60,40,40,0.13), 0 0 0   rgba(232,180,188,0); }
      100% { box-shadow: 5px 6px 0 rgba(60,40,40,0.13), 0 0 28px rgba(232,180,188,0.55); }
    }
    /* washi tape turns pink on final */
    .modal-overlay.final .modal::before {
      background: rgba(245,191,196,0.8);
    }

    @media (max-width: 320px) {
      .machine-svg-wrap { width: 230px; }
      .knob-hitarea { right: 36px; bottom: 58px; width: 46px; height: 46px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .mini-ball, .modal-ball, .modal { animation: none !important; }
      .globe-balls.shaking { animation: none !important; }
      .knob-hitarea.spinning { animation: none !important; }
    }
  </style>
</head>
<body>

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  const BALL_COLORS = [
    '#f5bfc4','#b8d4e8','#c9c0e0','#f0e0a0',
    '#b4d8c8','#f2c9a8','#d4c4e8','#a8d4c0',
    '#f0c8d0','#d0e4b8','#e8d4b0','#c4d8f0'
  ];

  let busy = false;
  let msgIndex = 0;

  document.getElementById('total-count').textContent = MESSAGES.length;

  function nextMessage() {
    const i = Math.min(msgIndex, MESSAGES.length - 1);
    msgIndex++;
    return MESSAGES[i];
  }

  /* ─────────────────────────────────────
     SEQUENCE
     0–920ms   : knob spins + balls shuffle
     920ms+    : ball slides out → modal pops
  ───────────────────────────────────── */
  function turnKnob() {
    if (busy) return;
    busy = true;

    const isFinal    = (msgIndex === MESSAGES.length - 1); // last message about to show
    const color      = BALL_COLORS[Math.floor(Math.random() * BALL_COLORS.length)];
    const msg        = nextMessage();
    const knobHit    = document.getElementById('knob');
    const globeBalls = document.getElementById('globe-balls');
    const rb         = document.getElementById('rolling-ball');
    const machineEl  = document.getElementById('machine-svg-wrap');

    knobHit.classList.add('disabled');

    /* STAGE 1 — knob spins + balls shuffle */
    knobHit.classList.add('spinning');
    globeBalls.classList.add('shaking');

    setTimeout(() => {
      knobHit.classList.remove('spinning');
      globeBalls.classList.remove('shaking');

      /* STAGE 2 — ball slides out */
      rb.style.background = color;
      rb.style.display    = 'block';

      const svgEl    = document.getElementById('machine-svg');
      const svgRect  = svgEl.getBoundingClientRect();
      const scaleX   = svgRect.width  / 270;
      const scaleY   = svgRect.height / 390;

      const chuteX   = 135 * scaleX;
      const chuteY   = 370 * scaleY;

      const stageRect   = document.getElementById('machine-stage').getBoundingClientRect();
      const wrapRect    = machineEl.getBoundingClientRect();
      const wrapLeft    = wrapRect.left - stageRect.left;
      const wrapTop     = wrapRect.top  - stageRect.top;

      const trayWrap    = document.querySelector('.tray-wrap');
      const trayRect    = trayWrap.getBoundingClientRect();
      const trayTop     = trayRect.top  - stageRect.top + 4;
      const trayCentreX = trayRect.left + trayRect.width / 2 - stageRect.left;

      rb.style.transition = 'none';
      rb.style.opacity    = '0';
      rb.style.transform  = 'scale(0.5)';
      rb.style.left       = (wrapLeft + chuteX - 17) + 'px';
      rb.style.top        = (wrapTop  + chuteY - 17) + 'px';

      requestAnimationFrame(() => requestAnimationFrame(() => {
        rb.style.transition = 'opacity 0.12s ease, transform 0.12s ease';
        rb.style.opacity    = '1';
        rb.style.transform  = 'scale(1)';
      }));

      setTimeout(() => {
        rb.style.transition = 'left 0.38s cubic-bezier(0.25,0.46,0.45,0.94), top 0.3s cubic-bezier(0.25,0.46,0.45,0.94)';
        rb.style.left = (trayCentreX - 17) + 'px';
        rb.style.top  = trayTop + 'px';
      }, 150);

      setTimeout(() => {
        rb.style.transition = 'transform 0.1s ease-out';
        rb.style.transform  = 'scale(1.08, 0.93)';
      }, 510);
      setTimeout(() => {
        rb.style.transition = 'transform 0.08s ease-in';
        rb.style.transform  = 'scale(1)';
      }, 620);

      /* STAGE 3 — modal pops (+ balloons if final) */
      setTimeout(() => {
        rb.style.display = 'none';

        document.getElementById('modal-ball').style.background = color;
        document.getElementById('modal-message').textContent   = msg;

        const overlay = document.getElementById('modal-overlay');
        if (isFinal) {
          overlay.classList.add('final');
          launchBalloons();
        }
        overlay.classList.add('open');
        overlay.addEventListener('click', onBackdropClick);
      }, 780);

    }, 920);
  }

  document.getElementById('knob').addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); turnKnob(); }
  });

  function closeModal() {
    const overlay = document.getElementById('modal-overlay');
    overlay.classList.remove('open');
    overlay.classList.remove('final');
    overlay.removeEventListener('click', onBackdropClick);
    stopBalloons();
    busy = false;

    if (msgIndex >= MESSAGES.length) {
      document.getElementById('knob').classList.add('disabled');
      document.getElementById('idle-hint').textContent = '🎀 that\'s all the messages! 我愛你~';
    } else {
      document.getElementById('knob').classList.remove('disabled');
      document.getElementById('idle-hint').textContent =
        `turn again for message ${msgIndex + 1} of ${MESSAGES.length} ~`;
    }
  }

  function onBackdropClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });


  /* ══════════════════════════════════════════
     HEART BALLOON CELEBRATION
     Draws hand-drawn-style hearts that float
     up from the bottom of the screen.
  ══════════════════════════════════════════ */
  const balloonCanvas = document.getElementById('balloon-canvas');
  const bCtx = balloonCanvas.getContext('2d');
  let balloonAnimId = null;
  let balloons = [];

  // Pastel heart colours to match the page palette
  const HEART_COLORS = [
    '#f5bfc4', // rose
    '#c9c0e0', // lavender
    '#f0e0a0', // butter
    '#b4d8c8', // mint
    '#f2c9a8', // peach
    '#b8d4e8', // sky
    '#f0c8d0', // blush
    '#d4c4e8', // lilac
  ];

  function resizeBalloonCanvas() {
    balloonCanvas.width  = window.innerWidth;
    balloonCanvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeBalloonCanvas);

  function makeBalloon() {
    const size  = 28 + Math.random() * 28;       // 28–56px
    const sway  = (Math.random() - 0.5) * 1.2;   // gentle side drift
    const speed = 1.2 + Math.random() * 1.4;      // px per frame
    const wobbleFreq  = 0.03 + Math.random() * 0.03;
    const wobblePhase = Math.random() * Math.PI * 2;
    return {
      x:     Math.random() * balloonCanvas.width,
      y:     balloonCanvas.height + size + 10,   // start below screen
      size,
      color: HEART_COLORS[Math.floor(Math.random() * HEART_COLORS.length)],
      sway,
      speed,
      wobbleFreq,
      wobblePhase,
      age:   0,
      opacity: 0,
    };
  }

  // Draw a hand-drawn-style heart at (cx, cy) with given size
  function drawHeart(ctx, cx, cy, size, color, opacity) {
    ctx.save();
    ctx.globalAlpha = opacity;

    const s = size * 0.5; // half-size scale

    ctx.beginPath();
    // Classic heart via bezier curves, centred at (cx, cy)
    ctx.moveTo(cx, cy + s * 0.35);
    ctx.bezierCurveTo(cx, cy,           cx - s, cy - s * 0.5, cx - s, cy - s * 0.1);
    ctx.bezierCurveTo(cx - s, cy - s * 0.8, cx, cy - s * 0.9, cx, cy - s * 0.4);
    ctx.bezierCurveTo(cx, cy - s * 0.9, cx + s, cy - s * 0.8, cx + s, cy - s * 0.1);
    ctx.bezierCurveTo(cx + s, cy - s * 0.5, cx, cy,           cx, cy + s * 0.35);
    ctx.closePath();

    ctx.fillStyle   = color;
    ctx.fill();

    // Slightly wobbly ink outline — hand-drawn feel
    ctx.strokeStyle = 'rgba(61,47,47,0.22)';
    ctx.lineWidth   = 1.6;
    ctx.stroke();

    // Little shine spot
    ctx.beginPath();
    ctx.ellipse(cx - s * 0.28, cy - s * 0.42, s * 0.18, s * 0.12, -0.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.fill();

    // String — a gentle wavy line downward
    ctx.beginPath();
    ctx.moveTo(cx, cy + s * 0.35);
    ctx.quadraticCurveTo(cx + s * 0.3, cy + s * 0.8, cx, cy + s * 1.6);
    ctx.strokeStyle = 'rgba(61,47,47,0.18)';
    ctx.lineWidth   = 1.2;
    ctx.stroke();

    ctx.restore();
  }

  let spawnTimer = 0;
  const SPAWN_INTERVAL = 18; // frames between new balloons

  function tickBalloons() {
    bCtx.clearRect(0, 0, balloonCanvas.width, balloonCanvas.height);

    // Spawn new balloon every N frames
    spawnTimer++;
    if (spawnTimer >= SPAWN_INTERVAL) {
      spawnTimer = 0;
      balloons.push(makeBalloon());
    }

    balloons = balloons.filter(b => b.y > -b.size * 2);

    for (const b of balloons) {
      b.age++;
      b.y -= b.speed;
      b.x += b.sway + Math.sin(b.age * b.wobbleFreq + b.wobblePhase) * 0.6;

      // Fade in over first 30 frames, fade out near top
      const fadeIn  = Math.min(1, b.age / 30);
      const fadeOut = Math.min(1, Math.max(0, (b.y) / (balloonCanvas.height * 0.2)));
      b.opacity = fadeIn * fadeOut;

      drawHeart(bCtx, b.x, b.y, b.size, b.color, b.opacity);
    }

    balloonAnimId = requestAnimationFrame(tickBalloons);
  }

  function launchBalloons() {
    resizeBalloonCanvas();
    balloonCanvas.style.display = 'block';
    balloons    = [];
    spawnTimer  = 0;
    // Pre-populate a few so screen isn't empty at start
    for (let i = 0; i < 8; i++) {
      const b = makeBalloon();
      b.y = balloonCanvas.height * (0.3 + Math.random() * 0.7);
      balloons.push(b);
    }
    if (balloonAnimId) cancelAnimationFrame(balloonAnimId);
    tickBalloons();
  }

  function stopBalloons() {
    if (balloonAnimId) {
      cancelAnimationFrame(balloonAnimId);
      balloonAnimId = null;
    }
    bCtx.clearRect(0, 0, balloonCanvas.width, balloonCanvas.height);
    balloonCanvas.style.display = 'none';
    balloons = [];
  }
</script>
</body>
